server.port=8080
spring.application.name=auction-service

# Eureka points to the registry container
eureka.client.serviceUrl.defaultZone=http://service-registry:8761/eureka/

#Property to disable eureka client
#eureka.client.enabled=false

# Eureka: talk to registry running on Localhost (from container)
#eureka.client.serviceUrl.defaultZone=http://host.docker.internal:8761/eureka/


# SQLite file inside container (mounted volume at /data)
spring.datasource.url=jdbc:sqlite:/data/auction.db?foreign_keys=on
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jackson.serialization.write-dates-as-timestamps=false
