<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Auction System — Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
      <div class="container">
        <a class="navbar-brand" href="index.html"
          ><img
            src="images/logo-transparent.png"
            alt="Auction Logo"
            height="40"
        /></a>
        <div class="ms-auto">
          <a class="btn btn-outline-secondary btn-sm" href="index.html"
            >Back to login</a
          >
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3 fw-bold">Reset Password</h1>
              <p class="text-muted mb-4">
                Enter your account email and a new password.
              </p>

              <div
                id="alertSuccess"
                class="alert alert-success d-none"
                role="alert"
              ></div>
              <div
                id="alertError"
                class="alert alert-danger d-none"
                role="alert"
              ></div>

              <form id="resetForm" class="needs-validation" novalidate>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    id="email"
                    type="email"
                    class="form-control"
                    required
                  />
                  <div class="invalid-feedback">Please enter your email.</div>
                </div>

                <div class="mb-3">
                  <label class="form-label">New password</label>
                  <input
                    id="newPassword"
                    type="password"
                    class="form-control"
                    minlength="6"
                    required
                  />
                  <div class="invalid-feedback">
                    Password must be at least 6 characters.
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Confirm new password</label>
                  <input
                    id="confirmPassword"
                    type="password"
                    class="form-control"
                    minlength="6"
                    required
                  />
                  <div class="invalid-feedback">Passwords must match.</div>
                </div>

                <button class="btn btn-primary w-100" type="submit">
                  Reset Password
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/password.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
