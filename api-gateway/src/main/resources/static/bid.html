<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Auction System — Bid</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
      <div class="container">
        <a class="navbar-brand" href="catalogue.html"
          ><img
            src="images/logo-transparent.png"
            alt="Auction Logo"
            height="40"
        /></a>
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-outline-primary btn-sm" href="catalogue.html"
            >Catalogue</a
          >
          <a
            class="btn btn-outline-secondary btn-sm"
            href="index.html"
            onclick="localStorage.clear()"
            >Logout</a
          >
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
          <div class="card shadow-sm mb-3">
            <div class="card-body">
              <h1 class="h4 mb-3 fw-bold">Bid on Item</h1>

              <div
                id="alertError"
                class="alert alert-danger d-none"
                role="alert"
              ></div>
              <div
                id="alertSuccess"
                class="alert alert-success d-none"
                role="alert"
              ></div>

              <!-- Auction summary -->
              <div class="row g-3">
                <div class="col-md-3 col-6">
                  <div class="text-muted small text-uppercase">Item ID</div>
                  <div id="item" class="fw-semibold">-</div>
                </div>
                <div class="col-md-3 col-6">
                  <div class="text-muted small text-uppercase">
                    Current Price
                  </div>
                  <div class="fw-semibold"><span id="price">-</span></div>
                </div>
                <div class="col-md-3 col-6">
                  <div class="text-muted small text-uppercase">
                    Highest Bidder
                  </div>
                  <div id="hb" class="fw-semibold">-</div>
                </div>
                <div class="col-md-3 col-6">
                  <div class="text-muted small text-uppercase">
                    Time Remaining
                  </div>
                  <div id="countdown" class="fw-semibold text-primary">--</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Bid form -->
          <div class="card shadow-sm">
            <div class="card-body">
              <h2 class="h5 mb-3">Place a Bid</h2>
              <form id="bidForm" class="row g-3 needs-validation" novalidate>
                <div class="col-md-6">
                  <label class="form-label">Your bid amount</label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input
                      id="amount"
                      type="number"
                      min="1"
                      class="form-control"
                      required
                    />
                    <div class="invalid-feedback">
                      Please enter a bid amount greater than 0.
                    </div>
                  </div>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                  <button class="btn btn-primary w-100" type="submit">
                    Place Bid
                  </button>
                </div>
                <div class="col-12">
                  <small class="text-muted">
                    Bids must be strictly higher than the current price. Page
                    auto-refreshes every few seconds.
                  </small>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Shared API helpers -->
    <script src="js/api.js"></script>
    <!-- Auction / bidding page logic -->
    <script src="js/auction.js"></script>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
