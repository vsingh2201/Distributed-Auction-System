<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"><title>Auction System - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="catalogue.html">Auction</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="nav" class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="catalogue.html">Catalogue</a></li>
                <li class="nav-item"><a class="nav-link" href="upload-item.html">Upload</a></li>
            </ul>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-secondary btn-sm" href="index.html" onclick="localStorage.clear()">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <header class="py-4 text-center">
        <h1 class="fw-bold">Auction System</h1>
        <p class="text-muted mb-0">Sign in to continue</p>
    </header>

    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form id="loginForm" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input id="username" type="email" class="form-control" required>
                            <div class="invalid-feedback">Please enter your email.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input id="password" type="password" class="form-control" required>
                            <div class="invalid-feedback">Please enter your password.</div>
                        </div>
                        <div class="mb-3 d-flex justify-content-end">
                            <a href="forgot-password.html" class="small">Forgot password?</a>
                        </div>

                        <button class="btn btn-primary w-100">Sign In</button>
                        <div id="msg" class="alert alert-danger mt-3 d-none">Invalid username or password</div>
                    </form>
                    <hr>
                    <div class="text-center">
                        <a href="signup.html" class="link-primary">Create a new account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
